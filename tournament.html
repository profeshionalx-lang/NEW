<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grechka • Турнир</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <style> * { font-family: 'Inter', sans-serif; } </style>
    <script src="js/config.js"></script>
    <script type="text/babel" src="js/shared.js"></script>
</head>
<body class="bg-black text-white">
    <div id="root"></div>

    <script type="text/babel">
        // Сюда копируем ВСЮ логику, связанную с самим турниром:
        // generateGroups, recalcGroup
        // TournamentView, TournamentInfo, StageView, GroupView, MatchCard, ScoreModal, PairsEditor

        function TournamentPage() {
            const params = new URLSearchParams(window.location.search);
            const tournamentId = params.get('tournament');
            
            // Используем компонент TournamentView, но кнопку "Назад" делаем ссылкой
            // Вам нужно немного изменить TournamentView из оригинального файла:
            // Вместо onBack, сделайте <a href="index.html">← Назад</a>
            
            if (!tournamentId) return <div>Турнир не найден</div>;

            return <TournamentView tournamentId={tournamentId} />;
        }

        // Вставьте сюда компоненты TournamentView, PairsEditor и т.д.
        // Заменив внутри onBack={goHome} на обычную ссылку <a href="index.html">

        function App() {
            const auth = window.useAuthState();
            return (
                <window.AuthContext.Provider value={auth}>
                    <window.Layout activePage="tournaments">
                        <TournamentPage />
                    </window.Layout>
                </window.AuthContext.Provider>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
