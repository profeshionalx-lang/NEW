<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grechka • Padel • Турниры</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <style> * { font-family: 'Inter', sans-serif; } </style>
    <script src="js/config.js"></script>
    <script type="text/babel" src="js/shared.js"></script>
</head>
<body class="bg-black text-white">
    <div id="root"></div>

    <script type="text/babel">
        // Компоненты TournamentCard, TournamentList, CreateTournament

        function TournamentCard({ tournament: t }) {
            // Обратите внимание: мы используем ссылку <a> для перехода
            return (
                <a href={`tournament.html?tournament=${t.id}`} className="block no-underline">
                    <window.Card className="p-6 cursor-pointer group hover:shadow-xl transition-all h-full">
                        <window.Badge>{t.status}</window.Badge>
                        <h3 className="text-2xl font-bold text-black my-4">{t.name}</h3>
                        <div className="text-gray-500">📅 {window.formatDate(t.date)}</div>
                    </window.Card>
                </a>
            );
        }

        function TournamentList() {
            const { user, isAdmin } = window.useAuth();
            const [showCreate, setShowCreate] = React.useState(false);
            const allTournaments = window.useCollection('tournaments');
            
            // Сюда вставьте логику CreateTournament из старого файла (CreateTournament component)
            // Если showCreate === true, показываем форму создания

            const createTournament = async (data) => {
                 const id = 'tournament_' + Date.now();
                 await window.fb.doc('tournaments', id).set({ 
                    id, ...data, status: 'upcoming', deleted: false, 
                    createdAt: new Date().toISOString(), createdBy: user?.uid 
                 });
                 window.location.href = `tournament.html?tournament=${id}`;
            };

            // Если режим создания
            if (showCreate) {
                 // Тут верните компонент CreateTournament (нужно скопировать его код)
                 // Передав onSubmit={createTournament}
                 return (
                     <div>
                        <window.Button onClick={() => setShowCreate(false)}>Назад</window.Button>
                        {/* Форма создания */}
                     </div>
                 );
            }

            return (
                <div className="space-y-8">
                    <div className="flex justify-end"><window.Button onClick={() => setShowCreate(true)}>+ Создать турнир</window.Button></div>
                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                        {allTournaments.filter(t => !t.deleted).map(t => (
                            <TournamentCard key={t.id} tournament={t} />
                        ))}
                    </div>
                </div>
            );
        }

        function App() {
            const auth = window.useAuthState();
            return (
                <window.AuthContext.Provider value={auth}>
                    <window.Layout activePage="tournaments">
                        <TournamentList />
                    </window.Layout>
                </window.AuthContext.Provider>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
