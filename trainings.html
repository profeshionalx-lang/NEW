<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grechka • Тренировки</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <style> * { font-family: 'Inter', sans-serif; } </style>
    
    <script src="/NEW/js/config.js"></script>
    <script type="text/babel" src="/NEW/js/shared.js"></script>
</head>
<body class="bg-black">
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        function CreateTraining({ onClose }) {
            const { user } = window.useAuth();
            const [form, setForm] = useState({ title: 'Тренировка', datetime: '', location: 'Grecha', price: '10 euro', maxParticipants: 8 });
            
            const submit = async () => {
                const id = 'tr_' + Date.now();
                await window.fb.doc('trainings', id).set({ id, ...form, participants: [], deleted: false, createdBy: user.uid });
                onClose();
            };

            return (
                <window.Modal onClose={onClose}>
                    <window.Card className="p-8 w-96">
                        <h3 className="text-black text-2xl font-bold mb-4">Новая тренировка</h3>
                        <div className="space-y-4">
                            <window.Input label="Название" value={form.title} onChange={e => setForm({...form, title: e.target.value})} />
                            <window.Input label="Дата" type="datetime-local" value={form.datetime} onChange={e => setForm({...form, datetime: e.target.value})} />
                            <window.Input label="Цена" value={form.price} onChange={e => setForm({...form, price: e.target.value})} />
                            <window.Input label="Место" value={form.location} onChange={e => setForm({...form, location: e.target.value})} />
                            <window.Button onClick={submit} className="w-full">Создать</window.Button>
                        </div>
                    </window.Card>
                </window.Modal>
            );
        }

        function TrainingsView() {
            const { user, isAdmin, showAuth } = window.useAuth();
            const trainings = window.useCollection('trainings');
            const [creating, setCreating] = useState(false);
            
            const days = Array(7).fill().map((_, i) => {
                const d = new Date(); d.setDate(d.getDate() + i);
                return d;
            });

            const join = async (tid) => {
                if(!user) return showAuth();
                const t = trainings.find(t => t.id === tid);
                if (t.participants?.length >= t.maxParticipants) return alert('Мест нет');

                await window.fb.doc('trainings', tid).update({ participants: window.fb.arrayUnion({ id: user.uid, name: user.displayName, photoURL: user.photoURL }) });
            };
            
            const leave = async (tid) => {
                const t = trainings.find(t => t.id === tid);
                const p = t.participants.find(p => p.id === user.uid);
                await window.fb.doc('trainings', tid).update({ participants: window.fb.arrayRemove(p) });
            };

            return (
                <div className="space-y-8">
                    <div className="flex justify-between">
                        <h2 className="text-3xl font-bold text-white">Расписание</h2>
                        {isAdmin && <window.Button onClick={() => setCreating(true)}>+ Добавить</window.Button>}
                    </div>

                    <div className="flex gap-4 overflow-x-auto pb-4">
                        {days.map((day, i) => (
                            <div key={i} className="flex-shrink-0 w-80">
                                <window.Card dark className="p-6 h-full border border-white/10">
                                    <div className="text-2xl font-bold text-white mb-4">{day.toLocaleDateString('ru-RU', {weekday: 'long'})}</div>
                                    <div className="space-y-4">
                                        {trainings.filter(t => !t.deleted && new Date(t.datetime).toDateString() === day.toDateString()).sort((a,b) => new Date(a.datetime) - new Date(b.datetime)).map(t => {
                                            const isReg = t.participants?.some(p => p.id === user?.uid);
                                            const isFull = t.participants?.length >= t.maxParticipants;
                                            return (
                                                <div key={t.id} className="bg-white/10 rounded-xl p-4 text-white">
                                                    <div className="font-bold">{new Date(t.datetime).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</div>
                                                    <div className="text-sm opacity-70 mb-2">{t.title}</div>
                                                    <div className="flex justify-between items-center">
                                                        <span className={`text-xs ${isFull ? 'text-red-400' : ''}`}>{t.participants?.length}/{t.maxParticipants}</span>
                                                        {isReg ? 
                                                            <button onClick={() => leave(t.id)} className="text-red-400 text-xs">Выйти</button> :
                                                            <button onClick={() => join(t.id)} disabled={isFull} className={window.cn('bg-white text-black px-3 py-1 rounded-full text-xs font-bold', isFull && 'opacity-50 cursor-not-allowed')}>
                                                                {isFull ? 'Full' : 'Join'}
                                                            </button>
                                                        }
                                                    </div>
                                                </div>
                                            );
                                        })}
                                        {trainings.filter(t => !t.deleted && new Date(t.datetime).toDateString() === day.toDateString()).length === 0 && <div className="text-white/20 text-center py-4">Нет тренировок</div>}
                                    </div>
                                </window.Card>
                            </div>
                        ))}
                    </div>
                    {creating && <CreateTraining onClose={() => setCreating(false)} />}
                </div>
            );
        }

        function App() {
            const auth = window.useAuthState();
            return (
                <window.AuthContext.Provider value={auth}>
                    <window.Layout activePage="trainings"><TrainingsView /></window.Layout>
                </window.AuthContext.Provider>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
